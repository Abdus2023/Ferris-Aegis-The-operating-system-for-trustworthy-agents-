[policy]
name = "default-safety"
version = "1.0.0"
priority = 100
enabled = true
default_effect = "deny"

# ── Filesystem Rules ──────────────────────────────────────────────

[[rules]]
action = "file:read"
effect = "allow"
targets = ["/workspace/*"]
description = "Allow reads from workspace directory"

[[rules]]
action = "file:write"
effect = "deny"
targets = ["/etc/*", "/var/*", "/sys/*", "/proc/*", "/boot/*"]
description = "Deny writes to system directories"

[[rules]]
action = "file:write"
effect = "allow"
targets = ["/workspace/output/*"]
description = "Allow writes to workspace output directory"

# ── Network Rules ─────────────────────────────────────────────────

[[rules]]
action = "network:connect"
effect = "deny"
targets = ["10.*", "172.16.*", "192.168.*", "127.0.0.1:*", "localhost:*"]
description = "Deny connections to internal/private networks"

[[rules]]
action = "network:connect"
effect = "allow"
targets = ["api.openai.com:443", "api.anthropic.com:443"]
description = "Allow connections to approved AI API endpoints"

# ── Execution Rules ───────────────────────────────────────────────

[[rules]]
action = "exec:*"
effect = "deny"
targets = []
description = "Deny arbitrary code execution by default"

# ── Agent Communication ───────────────────────────────────────────

[[rules]]
action = "comm:broadcast"
effect = "deny"
targets = []
description = "Deny broadcast messages to all agents"

[[rules]]
action = "comm:direct"
effect = "allow"
targets = []
description = "Allow direct agent-to-agent communication"
